name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform:
    name: Validation Terraform + LocalStack
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566
        env:
          SERVICES: s3,ec2
          LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: 1
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          LOCALSTACK_AUTH_TOKEN: ${{secrets.ls-JIVu8982-NAji-NEjE-3917-kUrILeLaea7f}}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt (vérifie le formatage)
        working-directory: ./terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform apply (sur LocalStack)
        working-directory: ./terraform
        run: terraform apply -auto-approve

  docker-build:
    name: Build image Docker TeleAssist
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build l'image Docker
        run: docker build -t teleassist:latest .

      - name: Vérifie que l'image existe
        run: docker images | grep teleassist