apiVersion: apps/v1
kind: Deployment
metadata:
  name: teleassist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teleassist
  template:
    metadata:
      labels:
        app: teleassist
    spec:
      containers:
        - name: teleassist
          image: teleassist:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: teleassist-secrets
                  key: gemini-api-key